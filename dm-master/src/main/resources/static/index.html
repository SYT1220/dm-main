    <script type="text/javascript">        var loginType = null;
    var currentUser = null;

    /**
     * jquery 初始化加载，默认导航选中 home
     */
    $(function () {
        var account = localStorage.getItem("account");
        if (isNull(account)) {
            window.location.href = "login.html";
        }
        var type = localStorage.getItem("type");
        loginType = type;
        currentUser = account;

        // 加载权限数据
        loadPermissions();

        if (type === '2') {
            $("#buildingNavItem").css('display', 'none');
            $("#dormitoryManagerNavItem").css('display', 'none');
            $("#adminNavItem").css('display', 'none');
        } else if (type === '3') {
            $("#buildingNavItem").css('display', 'none');
            $("#liveNavItem").css('display', 'none');
            $("#dormitoryManagerNavItem").css('display', 'none');
            $("#adminNavItem").css('display', 'none');

            //新增权限
            $("#studentAddButton").css('display', 'none');
            $("#buildingAddButton").css('display', 'none');
            $("#dormitoryAddButton").css('display', 'none');
            $("#liveAddButton").css('display', 'none');
            $("#dormitoryManagerAddButton").css('display', 'none');
            $("#adminAddButton").css('display', 'none');

            //导出权限
                $("#studentExportButton").css('display', 'none');
                $("#buildingExportButton").css('display', 'none');
                $("#dormitoryExportButton").css('display', 'none');
                $("#liveExportButton").css('display', 'none');
                $("#dormitoryManagerExportButton").css('display', 'none');
                $("#adminExportButton").css('display', 'none');


                //导入权限
                $("#studentUploadButton").css('display', 'none');
                $("#buildingUploadButton").css('display', 'none');
                $("#dormitoryUploadButton").css('display', 'none');
                $("#liveUploadButton").css('display', 'none');
                $("#dormitoryManagerUploadButton").css('display', 'none');
                $("#adminUploadButton").css('display', 'none');

            }
            $("#loginAccount").html(account);
            homeNav();
            $("#addLiveDate").datepicker({
                locale: 'zh-cn',
                format: 'yyyy-mm-dd',
                weekStartDay: 1
            });
            $("#updateLiveDate").datepicker({
                locale: 'zh-cn',
                format: 'yyyy-mm-dd',
                weekStartDay: 1
            });
        });
    /**
     * 加载当前用户的权限数据
     */
    function loadPermissions() {
        if (!currentUser || !loginType) {
            return;
        }

        $.ajax({
            async: true,
            cache: false,
            type: 'GET',
            datType: "json",
            accept: "application/json;charset=UTF-8",
            contentType: "application/json;charset=UTF-8",
            url: '/permissions',
            success: function (data) {
                if (data.success && data.permissions) {
                    if (loginType === '2' && data.permissions.buildingId) {
                        // 辅导员权限设置
                        dormitoryManagerBuildingId = data.permissions.buildingId;
                        dormitoryManagerDormitoryIds = data.permissions.dormitoryIds || [];
                        dormitoryManagerStudentIds = data.permissions.studentIds || [];

                        console.log('辅导员权限加载成功:', {
                            buildingId: dormitoryManagerBuildingId,
                            dormitoryCount: dormitoryManagerDormitoryIds.length,
                            studentCount: dormitoryManagerStudentIds.length
                        });
                    }
                }
            },
            error: function (data) {
                console.error('权限数据加载失败', data);
            }
        });
    }

    </script>

<div id="aiAssistantContainer" style="position: fixed; bottom: 50px; right: 20px; width: 300px; background: white; border: 1px solid #ccc; padding: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); z-index: 1000;" class="hidden">
    <h5>AI助手</h5>
    <div>
        <input type="text" id="userQuestion" placeholder="请输入您的问题" style="width: 70%;">
        <button onclick="askAI()" style="width: 25%; margin-left: 5px;">询问</button>
    </div>
    <div id="aiAnswer" style="margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 50px; max-height: 200px; overflow-y: auto;"></div>
    <div style="margin-top: 10px;">
        <button onclick="clearAIConversation()" style="width: 45%;">清除</button>
        <button onclick="askSampleQuestion('如何添加学生信息？')" style="width: 45%; margin-left: 5px;">示例</button>
    </div>
    <div style="margin-top: 10px; font-size: 12px; color: #666;">
        示例问题：
        <div>- 如何添加学生信息？</div>
        <div>- 宿舍分配规则是什么？</div>
    </div>
</div>

<script>
    async function askAI() {
        const question = document.getElementById('userQuestion').value;
        if (!question.trim()) return;

        // 显示正在处理的提示
        document.getElementById('aiAnswer').innerText = '正在处理...';

        try {
            const response = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: question })
            });

            const data = await response.json();
            document.getElementById('aiAnswer').innerText = data.response;
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('aiAnswer').innerText = 'AI助手暂时不可用';
        }
    }

    // 添加清除功能
    function clearAIConversation() {
        document.getElementById('userQuestion').value = '';
        document.getElementById('aiAnswer').innerText = '';
    }

    // 添加示例问题功能
    function askSampleQuestion(question) {
        document.getElementById('userQuestion').value = question;
        askAI();
    }

    // 添加回车键支持
    document.addEventListener('DOMContentLoaded', function() {
        const userQuestionInput = document.getElementById('userQuestion');
        if (userQuestionInput) {
            userQuestionInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    askAI();
                }
            });
        }
    });

    const AI_helper = document.querySelector('.AI_help');
    const AI_assistant = document.getElementById('aiAssistantContainer');
    const disappear = document.querySelector('.bck_img')

    AI_helper.addEventListener('click', function () {
        AI_assistant.classList.remove('hidden');
    })

    disappear.addEventListener('click', function () {
        AI_assistant.classList.add('hidden');
    })
</script>

</body>
</html>
